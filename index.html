<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="description"
      content="GrowEase"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>GrowEase</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css"
    />
    <link
      rel="stylesheet"
      href="./css/main.min.css"
    />
  </head>
  <body>
    <header>
      <div class="header__container">
        <div class="logo">
          <a
            href=""
            class="logo__text"
          >
            GrowEase
          </a>

          <svg class="logo__icon">
            <use href="./images/sprite.svg#icon-logo"></use>
          </svg>
        </div>

        <nav class="nav">
          <ul class="nav__list">
            <li class="nav__item">
              <a
                href=""
                class="nav__link"
                >Home</a
              >
            </li>
            <li class="nav__item">
              <a
                href=""
                class="nav__link"
                >Features</a
              >
            </li>
            <li class="nav__item">
              <a
                href=""
                class="nav__link"
                >Pricing</a
              >
            </li>
            <li class="nav__item">
              <a
                href=""
                class="nav__link"
                >Contact</a
              >
            </li>
          </ul>
        </nav>

        <button
          type="button"
          class="header__button"
        >
          Button
        </button>

        <button
          type="button"
          class="menu-button"
        >
          <svg class="menu-icon">
            <use href="./images/sprite.svg#icon-menu"></use>
          </svg>

          Menu
        </button>
      </div>
    </header>
  </body>
</html>
